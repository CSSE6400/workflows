name: Linting (optional)

on:
  workflow_call:

jobs:
  terraform:
    runs-on: [self-hosted, Linux, X64, amazon, generic]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: fmt check
        id: fmt
        run: terraform fmt -check

      - name: Init
        run: terraform init

      - name: Validate
        id: validate
        run: terraform validate

      - name: TFLint config
        id: tflint-config
        run: |
          cat <<EOF > .tflint.hcl
          tflint {
            required_version = ">= 0.50"
          }
            
          config {
            format = "compact"
          }

          plugin "terraform" {
            enabled = true
            preset  = "recommended"
          }

          plugin "opa" {
            enabled = true
            version = "0.10.0"
            source  = "github.com/terraform-linters/tflint-ruleset-opa"
          }

          rule "terraform_required_version" {
            enabled = false
          }

          EOF

      - uses: terraform-linters/setup-tflint@v6
        name: Setup TFLint
        with:
          tflint_version: v0.52.0
          cache: true

      - name: Show version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint -f compact


  ai:
    name: AI
    runs-on: [self-hosted, Linux, X64, amazon, generic]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Document AI usage
        shell: bash
        run: |
            FILE_AI="AI.md"
            if [ -f "$FILE_AI" ]; then
              echo "# AI Declaration" >> $GITHUB_STEP_SUMMARY
              cat "$FILE_AI" >> $GITHUB_STEP_SUMMARY
            else 
              echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
              echo "> No AI usage declared or declaration is missing. If you did not use AI tools then this can be ignored." >> $GITHUB_STEP_SUMMARY
            fi