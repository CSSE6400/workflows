name: Cloud Assignment (Student Repository)

concurrency:
  group: cloud
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      assignment:
        description: 'Name of the assignment e.g. spamoverflow'
        required: true
        type: string
      deploy:
        description: 'Deploy the terraform'
        required: false
        type: boolean
        default: false
      deployed-url:
        description: 'URL of the deployed instance iff deploy is false'
        required: false
        type: string
      functionality:
        description: 'Run functionality tests against the deployment'
        required: false
        type: boolean
        default: false
      load:
        description: 'Run sample load tests against the deployment'
        required: false
        type: boolean
        default: false
      aws-access-key-id:
        description: 'AWS Access Key ID'
        required: false
        type: string
      aws-secret-access-key:
        description: 'AWS Secret Access Key'
        required: false
        type: string
      aws-session-token:
        description: 'AWS Session Token'
        required: false
        type: string

jobs:
  deploy-local:
    name: Build & Test (Stage 1)
    if: ${{ github.ref_name == 'stage-1' || startsWith(github.ref_name, 'stage-1/') }}
    runs-on: [self-hosted, Linux, X64, amazon, student]
    outputs:
      endpoint: ${{ steps.collect.outputs.endpoint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13.12'

      - name: Build
        shell: bash
        timeout-minutes: 20
        run: |
          chmod +x local.sh
          ./local.sh

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.CLOUD_ASSIGNMENT_APP_ID }}
          private-key: ${{ secrets.CLOUD_ASSIGNMENT_PRIVATE_KEY }}
          owner: CSSE6400P
          repositories: |
            ${{ inputs.assignment }}-tests
      
      - name: Clone tests
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          repository: csse6400/${{ inputs.assignment }}-tests
          path: marking

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        shell: bash
        run: |
          cd marking && poetry install

      - name: Warning
        shell: bash
        run: |
          echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
          echo "> The functionality tests provide feedback on your solution but are not your grade for the stage." >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        shell: bash
        env:
          pytest_github_report: true
          pytest_report_title: ":stethoscope: Functionality Tests"
          pytest_verbosity: 2
        run: |
          echo "running tests...."
          cd marking && poetry run pytest functionality
